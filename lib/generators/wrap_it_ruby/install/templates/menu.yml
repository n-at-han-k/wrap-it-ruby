# config/menu.yml
#
# Menu configuration for WrapItRuby.
#
# route: short name for the browser path (lowercase letters and dashes only, e.g. grafana)
# url:   full URL of the upstream service (protocol is stripped automatically, e.g. https://grafana.example.com)
#
# If `url` is present, the menu item is proxied through `/_proxy/<url + path>`.
# If `url` is blank, the item is a normal in-app navigation link.

- label: Example
  route: example
  url: example.com
  icon: globe
